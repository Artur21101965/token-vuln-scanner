name: Foundry Fuzz Campaign

on:
  schedule:
    - cron: '0 0 * * *'  # ежедневно в полночь UTC
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run fuzz tests
        run: |
          cd fuzz/foundry
          forge test --fuzz-runs 50000 -vv 2>&1 || echo "Fuzz tests завершены (некоторые могут фейлиться)"

      - name: Run Echidna (Docker)
        run: |
          cd fuzz/foundry
          # Эхинда в Docker — опционально
          docker run --rm -v $PWD:/src ghcr.io/crytic/echidna/echidna:latest . --test-limit 10000 2>&1 || echo "Echidna skipped"
