version: "3.8"

services:
  dashboard:
    build: .
    container_name: monster-dashboard
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./logs:/app/logs
      - scanner_data:/app/scanner.db
    environment:
      - TZ=Europe/Moscow

  # Tor SOCKS5 прокси (опционально)
  tor:
    image: dperson/torproxy:latest
    container_name: monster-tor
    restart: unless-stopped
    ports:
      - "9050:9050"
    profiles:
      - tor

  # Все сканеры (отдельный сервис для масштабирования)
  scanner:
    build: .
    container_name: monster-scanner
    restart: unless-stopped
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./logs:/app/logs
      - scanner_data:/app/scanner.db
    environment:
      - TZ=Europe/Moscow
    command: >
      sh -c "
      python monster_scanner.py ethereum --loop &
      python monster_scanner.py polygon --loop &
      python monster_scanner.py bsc --loop &
      python predator.py ethereum &
      python predator.py polygon &
      python ens_sniper.py &
      python solana_predator.py &
      python leaked_key_hunter.py &
      python key_monitor.py &
      python storage_fisher.py &
      python launchpad_vulture.py ethereum &
      wait
      "
    profiles:
      - full

volumes:
  scanner_data:
