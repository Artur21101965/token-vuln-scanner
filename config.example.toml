[rpc]
# Можно указать несколько URL через запятую — будет round-robin
ethereum = "https://ethereum-rpc.publicnode.com,https://eth.llamarpc.com,https://rpc.ankr.com/eth"
bsc = "https://bsc-dataseed.binance.org,https://bsc.llamarpc.com"
arbitrum = "https://arb1.arbitrum.io/rpc,https://arbitrum.llamarpc.com"
base = "https://mainnet.base.org,https://base.llamarpc.com"
polygon = "https://polygon-bor.publicnode.com,https://polygon.llamarpc.com"
avalanche = "https://api.avax.network/ext/bc/C/rpc,https://avalanche.llamarpc.com"
optimism = "https://mainnet.optimism.io,https://optimism.llamarpc.com"
zksync = "https://mainnet.era.zksync.io"
linea = "https://rpc.linea.build,https://linea.llamarpc.com"
scroll = "https://rpc.scroll.io,https://scroll.llamarpc.com"
solana = "https://api.mainnet-beta.solana.com"

[tor]
# Включить Tor SOCKS5 прокси для всех RPC-запросов (полная анонимность)
# Требуется: brew install tor && brew services start tor
enabled = false

[explorer]
etherscan_key = "YOUR_ETHERSCAN_KEY"
bscscan_key = "YOUR_ETHERSCAN_KEY"
arbiscan_key = "YOUR_ETHERSCAN_KEY"
basescan_key = "YOUR_ETHERSCAN_KEY"
polygonscan_key = "YOUR_ETHERSCAN_KEY"
snowtrace_key = "YOUR_ETHERSCAN_KEY"
optimistic_key = "YOUR_ETHERSCAN_KEY"
zksync_key = ""
lineascan_key = ""
scrollscan_key = ""
github_token = "YOUR_GITHUB_TOKEN"

[monitor]
min_liquidity_usd = 100
dex_screener_ws = "wss://api.dexscreener.com/token-profiles/latest/v1"

[analyzer]
poll_interval = 1.0
reports_dir = "reports"
db_path = "scanner.db"

[telegram]
bot_token = "YOUR_TELEGRAM_BOT_TOKEN"
chat_id = "YOUR_TELEGRAM_CHAT_ID"

[executor]
evm_private_key = "YOUR_EVM_PRIVATE_KEY"
receive_address = "YOUR_RECEIVE_ADDRESS"
solana_private_key = "YOUR_SOLANA_PRIVATE_KEY"

[wallet]
ethereum = "0xYOUR_ETH_ADDRESS"
bsc = ""
arbitrum = ""
base = ""
polygon = ""
avalanche = ""
optimism = ""
zksync = ""
linea = ""
scroll = ""
solana = "YOUR_SOLANA_ADDRESS"
